<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ملصق مبيد</title>

<style>

body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

/* العنوان */
.title {
    text-align: center;
    color: red;
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* الوصف */
.description textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
    background: transparent;
    margin-bottom: 15px;
}

/* جدول التركيب */
table {
    width: 100%;
    border-collapse: collapse;
    direction: ltr;
}

th, td {
    border: 1px dashed #555;
    padding: 10px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}

.col-en { text-align: left; }
.col-ar { text-align: right; }

/* جدول المجموعة */
.group-table {
    width: 100%;
    border: 3px solid #000;
    border-collapse: collapse;
    margin-top: 20px;
    font-weight: bold;
}

.group-table td {
    padding: 8px;
    text-align: center;
}

.group-left,
.group-right {
    background: #eee;
    width: 30%;
    font-size: 18px;
}

.group-center {
    background: #000;
    color: #fff;
    width: 40%;
    font-size: 20px;
}

/* خواص المبيد */
.features-box {
    width: 100%;
    min-height: 80px;
    border: none;
    outline: none;
    resize: none;
    font-size: 18px;
    font-weight: bold;
    direction: rtl;
    text-align: right;
    background: transparent;
}

/* الشعار */
.logo {
    text-align: center;
    margin-top: 20px;
}

/* العلامات التحذيرية */
.hazards {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
}

.hazards img {
    width: 70px;
}

/* بيانات الوكيل */
.agent {
    margin-top: 20px;
    text-align: right;
    font-size: 18px;
    font-weight: bold;
}

</style>

</head>
<body>

<!-- العنوان -->
<div class="title">
مبيد حشري على هيئة مسحوق قابل للبلل (WP)
</div>

<!-- وصف متغير -->
<div class="description">
<textarea>
مبيد حشري جهازي على هيئة مسحوق قابل للبلل (WP)
</textarea>
</div>

<!-- جدول التركيب -->
<table>
<tr>
    <th class="col-en">Composition</th>
    <th>Ratio</th>
    <th>النسبة</th>
    <th class="col-ar">التركيب:</th>
</tr>

<tr>
    <td class="col-en">IMIDACLOPRID</td>
    <td>25% (w/w)</td>
    <td>25% و/و</td>
    <td class="col-ar">أيميداكلوبريد</td>
</tr>

<tr>
    <td class="col-en">Additives</td>
    <td>75% (w/w)</td>
    <td>75% و/و</td>
    <td class="col-ar">مواد مضافة</td>
</tr>

<tr>
    <td class="col-en">Total</td>
    <td>100% (w/w)</td>
    <td>100% و/و</td>
    <td class="col-ar">المجموع</td>
</tr>
</table>

<!-- جدول المجموعة -->
<table class="group-table">
<tr>
    <td class="group-left">GROUP</td>
    <td class="group-center">4A 3A</td>
    <td class="group-right">INSECTICIDE</td>
</tr>
</table>

<!-- خواص -->
<h3 style="color: green; text-align:right;">الخواص:</h3>
<textarea class="features-box" placeholder="اكتب خواص المبيد هنا..."></textarea>

<!-- شعار -->
<div class="logo">
<img src="logo.png" height="80">
</div>

<!-- تحذيرات -->
<div class="hazards">
<img src="hazard1.png">
<img src="hazard2.png">
<img src="hazard3.png">
</div>

<!-- بيانات الوكيل -->
<div class="agent">
<div>العنوان: الرياض - طريق الملك فهد</div>
<div>تلفون: 0114625322</div>
</div>

</body>
</html>
